<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentOS - Student Management System</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header {
            text-align: center;
            padding: 4rem 1rem 2rem 1rem;
        }

        .logo-container {
            width: 90px;
            height: 90px;
            background: var(--card-bg);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container svg {
            width: 45px;
            height: 45px;
            fill: var(--primary-color);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .download-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .download-card h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.95rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s, transform 0.1s;
            margin-bottom: 1rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .version-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <svg viewBox="0 0 24 24">
                <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
            </svg>
        </div>
        <h1>StudentOS</h1>
        <p class="subtitle">The easiest and most efficient system to manage your study tasks and academic info smoothly.</p>
    </header>

    <main>
        <div class="download-card">
            <h2>Download App</h2>
            
            <!-- زر تحميل الماك -->
            <a href="https://github.com/abon3lh2030-ai/StudentOS/releases/download/v1.0.0/StudentOS_Mac.zip" class="btn" download>
                <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.8 6.55c.59-.72 1-1.72.89-2.72-.88.04-1.95.59-2.58 1.32-.55.63-1.04 1.64-.91 2.64 1.01.08 2-.54 2.6-1.24z"/></svg>
                Download for macOS
            </a>

            <!-- زر تحميل الويندوز -->
            <a href="https://github.com/abon3lh2030-ai/StudentOS/releases/download/v1.0.0/StudentOS_Win.zip" class="btn" download>
                <svg viewBox="0 0 24 24"><path d="M3 5.5L10.5 4v7H3V5.5M11.5 3.8L21 2v9h-9.5V3.8M3 12.5h7.5v7L3 18v-5.5M11.5 12.5H21V19.5L11.5 21V12.5z"/></svg>
                Download for Windows

            <div class="version-info">Version 1.0.0 • Secure & Reliable</div>
        </div>
    </main>

    <footer>
        <p>All Rights Reserved © 2026 StudentOS</p>
    </footer>

</body>
</html>
